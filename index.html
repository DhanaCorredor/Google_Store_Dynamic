<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Google Pixel Buds Pro — premium wireless earbuds with Active Noise Cancellation. Available in 6 colors. Shop on the Google Store." />
    <title>Google Store</title>
    <link rel="icon" type="image/png" href="./img/google-logo.png" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <nav aria-label="Main navigation">
      <div class="links_contain">
        <a href="./pages/watches.html"><img src="./img/google-logo.png" alt="logo" /></a>
        <ul class="links">
          <li><a href="#">Phones</a></li>
          <li><a href="./pages/earbuds.html" aria-current="page">Earbuds</a></li>
          <li><a href="./pages/watches.html">Watches</a></li>
          <li><a href="#">Smart Home</a></li>
          <li><a href="#">Accessories</a></li>
          <li><a href="#">Subscriptions</a></li>
        </ul>
      </div>

      <ul class="icons">
        <li><a href="#"><img src="./img/icons/Search.svg" alt="Search" /></a></li>
        <li><a href="#"><img src="./img/icons/Help.svg" alt="Help" /></a></li>
        <li>
          <a href="#" id="abrir-carrito"><img src="./img/icons/Cart.svg" alt="Cart" /></a>
        </li>
        <li><a href="#"><img src="./img/icons/Avatar.svg" alt="User account" /></a></li>
        <li class="menu">
          <a href="#"><img src="./img/icons/icons-menu.svg" alt="Open menu" /></a>
        </li>
      </ul>
    </nav>

    <main>
      <a href="#" class="btn_back">
        <img src="./img/icons/Arrow.svg" alt="arrow" />
        See product details
      </a>

      <section>
        <div>
          <figure>
            <div class="thumbnails">
              <div><img src="./img/earbuds/earbuds_01.png" alt="Vista 1" /></div>
              <div><img src="./img/earbuds/earbuds_02.png" alt="Vista 2" /></div>
              <div><img src="./img/earbuds/earbuds_03.png" alt="Vista 3" /></div>
              <div><img src="./img/earbuds/earbuds_04.png" alt="Vista 4" /></div>
            </div>

            <div class="image">
              <img src="./img/earbuds/earbuds_01.png" alt="Imagen Principal" id="img-principal" />
            </div>
          </figure>
        </div>

        <div class="info_product">
          <div class="description">
            <h1>Google Pixel Buds Pro</h1>
            <p>Music & Sound</p>
            <p class="price_summary">229 €</p>
            <hr />
            <p id="color-label">Choose a Color</p>
          </div>

          <div class="purchase">
            <form id="formulario-compra">
              <fieldset class="colors" aria-labelledby="color-label">
                <input type="radio" name="color" id="color-blue" value="Azul Claro" data-image="./img/earbuds/earbuds_01.png" checked />
                <label for="color-blue" class="color-swatch swatch-blue"></label>

                <input type="radio" name="color" id="color-gray-light" value="Gris Claro" data-image="./img/earbuds/earbuds_02.png" />
                <label for="color-gray-light" class="color-swatch swatch-gray-light"></label>

                <input type="radio" name="color" id="color-dark" value="Negro" data-image="./img/earbuds/earbuds_03.png" />
                <label for="color-dark" class="color-swatch swatch-dark"></label>

                <input type="radio" name="color" id="color-gray" value="Gris" data-image="./img/earbuds/earbuds_04.png" />
                <label for="color-gray" class="color-swatch swatch-gray"></label>

                <input type="radio" name="color" id="color-green" value="Verde" data-image="./img/earbuds/earbuds_01.png" />
                <label for="color-green" class="color-swatch swatch-green"></label>

                <input type="radio" name="color" id="color-red" value="Rojo" data-image="./img/earbuds/earbuds_02.png" />
                <label for="color-red" class="color-swatch swatch-red"></label>
              </fieldset>

              <div class="purchase_details">
                <p class="price_purchase">229 €</p>
                <hr />
                <div class="select_quantity">
                  <label for="quantity" class="sr-only">Quantity</label>
                  <select name="quantity" id="quantity">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                  </select>
                  <button type="submit" id="btn-add">Add to cart</button>
                </div>
              </div>
            </form>

            <div class="delivery">
              <img src="./img/icons/Delivery.svg" alt="Free delivery" />
              <p>Delivers 29 Apr to <span>08023</span></p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div id="carrito-ventana" style="display: none; position: fixed; top: 70px; right: 20px; background: white; border: 1px solid #ccc; padding: 20px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); z-index: 1000; min-width: 250px; color: black;">
        <h3>Tu Carrito 🛒</h3>
        <ul id="lista-carrito" style="list-style: none; padding: 0; margin-top: 10px;">
          <li>El carrito está vacío</li>
        </ul>
        <hr />
        <button id="cerrar-carrito" style="cursor: pointer; padding: 5px 10px;">Cerrar</button>
      </div>
    </footer>
    <script src="./scripts/dynamic.js"></script>
  </body>
</html>
